<!DOCTYPE html>
<html>
<head>
<base target="_top">
<title>Cashflow Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --surface: #fcfcfb;
    --page: #f2f1ed;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --border: #e1e0d9;
    --border-strong: #c3c2b7;
    --accent: #2a78d6;
    --accent-bg: rgba(42, 120, 214, 0.1);
    --danger: #e34948;
    --good: #0ca30c;
    --shadow: rgba(0, 0, 0, 0.08) 0 4px 16px -4px;
    --banner: #fdf6e3;
    --banner-border: #eadfb4;
    --banner-text: #6b5b1e;
    --year-shade: rgba(0, 0, 0, 0.035);
  }
  :root[data-theme="dark"] {
    --surface: #1a1a19;
    --page: #121211;
    --text-primary: #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted: #898781;
    --border: #2c2c2a;
    --border-strong: #383835;
    --accent: #3987e5;
    --accent-bg: rgba(57, 135, 229, 0.15);
    --danger: #e66767;
    --good: #0ca30c;
    --shadow: rgba(0, 0, 0, 0.4) 0 4px 16px -4px;
    --banner: #2a2410;
    --banner-border: #4a3f16;
    --banner-text: #e0c869;
    --year-shade: rgba(255, 255, 255, 0.045);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --surface: #1a1a19;
      --page: #121211;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted: #898781;
      --border: #2c2c2a;
      --border-strong: #383835;
      --accent: #3987e5;
      --accent-bg: rgba(57, 135, 229, 0.15);
      --danger: #e66767;
      --good: #0ca30c;
      --shadow: rgba(0, 0, 0, 0.4) 0 4px 16px -4px;
      --banner: #2a2410;
      --banner-border: #4a3f16;
      --banner-text: #e0c869;
      --year-shade: rgba(255, 255, 255, 0.045);
    }
  }

  /* Accent color alternatives */
  :root[data-accent="green"] { --accent: #2e9e5b; --accent-bg: rgba(46, 158, 91, 0.1); }
  :root[data-accent="purple"] { --accent: #7c5cff; --accent-bg: rgba(124, 92, 255, 0.1); }
  :root[data-accent="orange"] { --accent: #c8720a; --accent-bg: rgba(200, 114, 10, 0.1); }
  :root[data-accent="rose"] { --accent: #c23b6b; --accent-bg: rgba(194, 59, 107, 0.1); }
  :root[data-accent="black"] { --accent: #1a1a1a; --accent-bg: rgba(26, 26, 26, 0.08); }
  :root[data-theme="dark"][data-accent="green"] { --accent: #3fc178; --accent-bg: rgba(63, 193, 120, 0.15); }
  :root[data-theme="dark"][data-accent="purple"] { --accent: #9277ff; --accent-bg: rgba(146, 119, 255, 0.15); }
  :root[data-theme="dark"][data-accent="orange"] { --accent: #e08a2b; --accent-bg: rgba(224, 138, 43, 0.15); }
  :root[data-theme="dark"][data-accent="rose"] { --accent: #e35a8c; --accent-bg: rgba(227, 90, 140, 0.15); }
  :root[data-theme="dark"][data-accent="black"] { --accent: #e5e5e5; --accent-bg: rgba(229, 229, 229, 0.15); }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"])[data-accent="green"] { --accent: #3fc178; --accent-bg: rgba(63, 193, 120, 0.15); }
    :root:not([data-theme="light"])[data-accent="purple"] { --accent: #9277ff; --accent-bg: rgba(146, 119, 255, 0.15); }
    :root:not([data-theme="light"])[data-accent="orange"] { --accent: #e08a2b; --accent-bg: rgba(224, 138, 43, 0.15); }
    :root:not([data-theme="light"])[data-accent="rose"] { --accent: #e35a8c; --accent-bg: rgba(227, 90, 140, 0.15); }
    :root:not([data-theme="light"])[data-accent="black"] { --accent: #e5e5e5; --accent-bg: rgba(229, 229, 229, 0.15); }
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page);
    color: var(--text-primary);
    font-size: 14px;
  }
  button, input, select { font-family: inherit; font-size: inherit; }
  input, select {
    color: var(--text-primary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

  .demo-banner {
    background: var(--banner);
    border-bottom: 1px solid var(--banner-border);
    color: var(--banner-text);
    font-size: 12.5px;
    padding: 8px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
    text-align: center;
  }
  .demo-banner strong { font-weight: 700; }

  .app { max-width: 1400px; margin: 0 auto; padding: 0 24px 64px; }

  .app-topbar { display: flex; align-items: center; gap: 16px; padding: 10px 0; }
  .app-topbar__title { font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); }
  .app-topbar__spacer { flex: 1; }

  .project-header {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px 24px; margin-bottom: 16px; box-shadow: var(--shadow);
  }
  .project-header--collapsed { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; }
  .project-header__collapsed-name { font-size: 16px; font-weight: 600; }
  .project-header__collapsed-left { display: flex; flex-direction: column; }
  .project-header__brand { display: block; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); margin-bottom: 2px; }
  .project-header__top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .project-header__name { font-size: 22px; font-weight: 700; margin-bottom: 0; width: auto; flex: 1; }
  .project-header__meta { display: flex; gap: 32px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); }
  .project-header__meta b { display: block; color: var(--text-secondary); font-weight: 500; font-size: 13px; margin-top: 2px; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab {
    background: none; border: none; padding: 10px 16px; cursor: pointer; color: var(--text-secondary);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab--active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  .section { display: flex; flex-direction: column; gap: 20px; }
  .section__intro { color: var(--text-secondary); max-width: 720px; line-height: 1.5; }

  .link-button { background: none; border: none; color: var(--accent); cursor: pointer; padding: 2px 4px; font-size: inherit; }
  .link-button:hover { text-decoration: underline; }
  .link-button:disabled { color: var(--text-muted); cursor: not-allowed; }
  .link-button--danger { color: var(--danger); }
  .secondary-button {
    background: var(--surface); border: 1px solid var(--border-strong); border-radius: 6px;
    padding: 8px 14px; cursor: pointer; color: var(--text-primary); align-self: flex-start;
  }
  .secondary-button:hover { border-color: var(--accent); }
  .secondary-button:disabled { color: var(--text-muted); cursor: not-allowed; }

  .category-group { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .category-group__header {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    background: var(--page); border-bottom: 1px solid var(--border);
  }
  .category-group__title { font-weight: 600; flex: 1; }
  .category-group__total { font-variant-numeric: tabular-nums; color: var(--text-secondary); }

  table.line-items-table, table.summary-grid { width: 100%; border-collapse: collapse; }
  .line-items-table th, .line-items-table td { padding: 6px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
  .line-items-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 500; }
  .col-money { text-align: right !important; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .col-code { width: 90px; }
  .col-date { width: 140px; }
  .col-schedule { width: 300px; }
  .col-actions { width: 90px; text-align: right !important; }

  .editable-text, .editable-number {
    border: 1px solid transparent; background: transparent; width: 100%; padding: 3px 4px; border-radius: 4px;
  }
  .editable-text:hover, .editable-number:hover { border-color: var(--border); }
  .editable-number { text-align: right; }
  .category-select { display: block; margin-top: 2px; font-size: 11px; color: var(--text-muted); border: none; background: transparent; padding: 0 4px; }

  .add-row td { padding: 8px 16px; }
  .total-row td { font-weight: 600; border-top: 2px solid var(--border-strong); border-bottom: none; }

  .schedule-row td { background: var(--page); padding: 16px !important; }
  .schedule-editor { display: flex; flex-direction: column; gap: 12px; }
  .schedule-editor__mode { display: flex; gap: 24px; font-size: 13px; }
  .schedule-editor__mode label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .schedule-editor__even { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .schedule-editor__even label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-muted); }
  .schedule-editor__hint { font-size: 12px; color: var(--text-secondary); }
  .schedule-editor__variance { font-size: 12px; color: var(--danger); }

  .mini-table { border-collapse: collapse; font-size: 13px; }
  .mini-table td { padding: 4px 10px 4px 0; border-bottom: 1px solid var(--border); }
  .mini-table th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 500; text-align: left; padding: 4px 10px 4px 0; }
  .mini-table input { width: 130px; }

  .summary-grid-wrap { overflow: auto; max-height: 70vh; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
  .summary-grid { font-size: 12.5px; }
  .summary-grid th, .summary-grid td { padding: 5px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .summary-grid th { position: sticky; top: 0; background: var(--surface); color: var(--text-muted); font-weight: 500; text-align: right; z-index: 2; }
  .summary-grid__label { text-align: left !important; position: sticky; left: 0; background: var(--surface); min-width: 260px; z-index: 1; }
  .summary-grid__budget { position: sticky; left: var(--budget-col-left, 260px); background: var(--surface); box-shadow: 2px 0 4px -2px rgba(0,0,0,0.15); z-index: 1; }
  .summary-grid th.summary-grid__label, .summary-grid th.summary-grid__budget { z-index: 3; }
  .summary-grid__code { color: var(--text-muted); margin-right: 6px; font-variant-numeric: tabular-nums; }
  .summary-grid__monthnum { display: block; font-size: 9.5px; font-weight: 400; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.02em; }
  .summary-grid__monthlabel { display: block; }
  .summary-grid__category td { font-weight: 600; background: var(--page); }
  .summary-grid__category td.summary-grid__label, .summary-grid__category td.summary-grid__budget { background: var(--page); }
  .summary-grid__subtotal td { font-weight: 600; border-top: 1px solid var(--border-strong); }
  .summary-grid__grandtotal td { font-weight: 700; border-top: 2px solid var(--border-strong); font-size: 13.5px; }
  .summary-grid-controls { display: flex; justify-content: flex-end; margin-bottom: -8px; }
  .summary-grid td.summary-grid__month--current, .summary-grid th.summary-grid__month--current { background: var(--accent-bg) !important; }
  .summary-grid__year-b { background: var(--year-shade); }
  .summary-grid__notes td { background: var(--surface); border-bottom: 2px solid var(--border-strong); }
  .summary-grid__notenote { width: 100%; min-width: 90px; border: 1px solid transparent; background: transparent; color: var(--text-secondary); font-size: 11px; font-style: italic; padding: 3px 4px; border-radius: 4px; }
  .summary-grid__notenote:hover, .summary-grid__notenote:focus { border-color: var(--border); font-style: normal; outline: none; }

  .cashflow-chart { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .cashflow-chart h3 { margin: 0; font-size: 14px; color: var(--text-secondary); }
  .cashflow-chart__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .cashflow-chart .bar { fill: var(--accent); }
  .cashflow-chart .gridline { stroke: var(--border); stroke-width: 1; }
  .cashflow-chart .axis-label { fill: var(--text-muted); font-size: 9.5px; font-family: system-ui, sans-serif; }
  .chart-tooltip {
    position: absolute; pointer-events: none; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 12px; box-shadow: var(--shadow); display: none; z-index: 10;
  }

  .summary-section-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border-strong); }
  .summary-section-header:first-child { margin-top: 0; }
  .summary-section-header h2 { margin: 0; font-size: 17px; font-weight: 700; color: var(--text-primary); }

  .annual-grid-wrap { max-height: none; }
  .annual-grid th, .annual-grid td { position: static !important; box-shadow: none !important; }
  .annual-draw-summary__draw-header { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .annual-draw-summary__draw-header label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
  .annual-draw-summary__period { font-size: 12px; color: var(--text-muted); }
  .cap-table-summary { width: 100%; }
  .cap-table-summary th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); font-weight: 500; text-align: left; padding: 4px 10px 4px 0; }

  .auto-split { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .auto-split h3 { margin: 0 0 12px; font-size: 14px; color: var(--text-secondary); }
  .auto-split__controls { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .auto-split__controls label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--text-muted); }
  .auto-badge { display: block; font-size: 10px; color: var(--text-muted); text-align: right; }

  .ledger { display: flex; gap: 32px; flex-wrap: wrap; }
  .ledger__column h4 { margin: 0 0 8px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(8px);
    background: var(--text-primary); color: var(--surface); padding: 8px 16px; border-radius: 6px;
    font-size: 12.5px; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 50;
  }
  .toast--visible { opacity: 1; transform: translateX(-50%) translateY(0); }

  .setup-gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .setup-gate__card { max-width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 32px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 16px; }
  .setup-gate__card h1 { font-size: 20px; margin: 0; }
  .setup-gate__card p { color: var(--text-secondary); line-height: 1.5; margin: 0; font-size: 13px; }
  .setup-gate__field { display: flex; flex-direction: column; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .setup-gate__field input { font-size: 12.5px; }
  .setup-gate__error { color: var(--danger) !important; }
  .signed-in-bar { display: flex; align-items: center; gap: 12px; justify-content: center; padding: 6px 24px; font-size: 11.5px; color: var(--text-muted); border-bottom: 1px solid var(--border); }

  /* On-screen print preview (mirrors the @media print rules below, live) */
  .print-preview-bar { position: sticky; top: 0; z-index: 100; display: flex; flex-direction: column; gap: 8px; background: var(--accent); color: #fff; padding: 10px 24px; }
  #ppSettingsPanel { display: flex; flex-direction: column; gap: 8px; }
  .print-preview-bar__row { display: flex; align-items: center; gap: 12px; }
  .print-preview-bar__settings { flex-wrap: wrap; font-size: 11px; }
  .print-preview-bar__settings label { display: flex; flex-direction: column; gap: 2px; opacity: 0.9; }
  .print-preview-bar__settings select, .print-preview-bar__settings input[type="number"] { font-size: 12px; padding: 3px 4px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); color: #fff; width: 64px; }
  .print-preview-bar__settings select option { color: #0b0b0b; }
  .print-preview-bar__checkbox { flex-direction: row !important; align-items: center; gap: 6px !important; }
  .print-preview-bar__margins { display: flex; gap: 12px; }
  .print-preview-bar__sections-list { flex-wrap: wrap; gap: 8px 20px; }
  .print-preview-bar__section-row { display: flex; align-items: center; gap: 8px; }
  .print-preview-bar__section-row select { font-size: 12px; padding: 3px 4px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); color: #fff; }
  .print-preview-bar__section-row select option { color: #0b0b0b; }
  .print-preview-bar__label { font-weight: 600; flex: 1; }
  .print-preview-bar button { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.4); border-radius: 6px; padding: 6px 12px; cursor: pointer; }
  .print-preview-bar button:hover { background: rgba(255,255,255,0.25); }
  .print-preview-mode { background: #fff; font-size: calc(1em * var(--print-font-scale, 1)); }
  .print-preview-mode.print-grayscale .print-pages { filter: grayscale(1); }
  .print-preview-mode .app-topbar, .print-preview-mode .tabs, .print-preview-mode .signed-in-bar { display: none !important; }
  .print-preview-mode .app, .print-preview-mode .section { max-width: none; }
  .print-preview-mode .summary-grid-wrap { overflow: visible !important; max-height: none !important; border: none; }
  .print-preview-mode .summary-grid th, .print-preview-mode .summary-grid__label, .print-preview-mode .summary-grid__budget { position: static !important; box-shadow: none !important; }
  .print-preview-mode .summary-grid th, .print-preview-mode .summary-grid td { padding-top: var(--print-row-padding, 5px); padding-bottom: var(--print-row-padding, 5px); }
  .print-preview-mode .cashflow-chart, .print-preview-mode .summary-grid-wrap, .print-preview-mode .draws-summary { border: none; box-shadow: none; }
  .print-preview-mode tr { page-break-inside: avoid; }
  .print-preview-mode .print-real-content { display: none !important; }
  .print-preview-mode .summary-grid { font-size: calc(12.5px * var(--print-font-scale, 1)); }
  .print-preview-mode .summary-grid__monthnum { font-size: calc(9.5px * var(--print-font-scale, 1)); }
  .print-preview-mode .summary-grid__grandtotal td { font-size: calc(13.5px * var(--print-font-scale, 1)); }
  .print-preview-mode .summary-grid__notenote { font-size: calc(11px * var(--print-font-scale, 1)); }
  .print-preview-mode .cashflow-chart h3 { font-size: calc(14px * var(--print-font-scale, 1)); }
  .print-preview-mode .mini-table { font-size: calc(13px * var(--print-font-scale, 1)); }
  .print-preview-mode .mini-table th { font-size: calc(11px * var(--print-font-scale, 1)); }
  .print-preview-mode .summary-section-header h2 { font-size: calc(17px * var(--print-font-scale, 1)); }
  .print-preview-mode .annual-draw-summary__draw-header label, .print-preview-mode .annual-draw-summary__period { font-size: calc(12px * var(--print-font-scale, 1)); }
  .print-preview-mode .cap-table-summary th { font-size: calc(11px * var(--print-font-scale, 1)); }

  @media print {
    @page { size: landscape; margin: 12mm; }
    body { background: #fff; font-size: calc(1em * var(--print-font-scale, 1)); }
    body.print-grayscale { filter: grayscale(1); }
    button, select, .tabs, .app-topbar, .signed-in-bar, .print-preview-bar, .project-header { display: none !important; }
    .app, .section { max-width: none; padding: 0 !important; margin: 0 !important; }
    /* Real printing reuses the same pre-paginated page boxes as the on-screen preview
       (not native CSS reflow) because break-before on nested/transformed elements is
       unreliable in WebKit/iOS Safari; explicit page-break-after between simple sibling
       boxes is far more broadly supported. */
    .print-real-content { display: none !important; }
    .print-pages { padding: 0 !important; gap: 0 !important; background: #fff !important; }
    .print-pages__toolbar { display: none !important; }
    /* break-after on a flex item is unreliable across engines (notably iOS Safari);
       force plain block flow for print so the forced page breaks actually apply. */
    .print-pages__pages { display: block !important; padding: 0 !important; gap: 0 !important; }
    .print-page-outer { display: block !important; margin: 0 auto !important; }
    .print-page-outer { width: var(--natural-width) !important; height: var(--natural-height) !important; }
    .print-page-outer:not(:last-child) { break-after: page; page-break-after: always; }
    /* @page's own margin already reserves the border band for the header/footer
       running content, so the page box itself should fill just the printable
       (content) area — not simulate its own margin on top of that. */
    /* Absolutely-positioned boxes (used on-screen to simulate a "sheet of paper" and to
       crop overflow) confuse the print engine's own pagination — it can re-fragment their
       content independently of the .print-page-outer break-after boundaries, producing
       phantom extra pages. Real print no longer needs the positioning/clipping at all
       since each page's content is already sized to fit, so fall back to plain flow. */
    .print-page { position: static !important; transform: none !important; box-shadow: none !important; width: 100% !important; height: 100% !important; }
    .print-page__viewport { position: static !important; overflow: visible !important; margin: 0 !important; width: 100% !important; height: 100% !important; }
    .print-page__label { display: none !important; }

<script>
(function () {
  "use strict";

  // ---------- state ----------
  var project = null;
  var activeTab = "summary";
  var expandedLineItemId = null;
  var expandedMemberId = null;
  var chartCollapsed = true;
  var projectHeaderCollapsed = true;
  var highlightCurrentMonth = true;
  var monthNotes = {};
  var summarySectionCollapsed = { drawsList: false, yearly: false, drawReport: false, capTable: false };
  var showDrawGenerator = false;
  var previewMode = false;
  var printSettingsPanelCollapsed = false;
  var printSettings = {
    pageSize: "letter", orientation: "landscape",
    marginTopIn: 0.5, marginRightIn: 0.5, marginBottomIn: 0.5, marginLeftIn: 0.5,
    fontScalePercent: 100, rowSize: "normal", colorMode: "color", repeatHeader: true,
    pageBreakPerSection: true, logoUrl: "",
  };
  var printSections = { cashflowGraph: true, cashflowTable: true, yearly: true, drawReport: true, capTable: true, drawsList: true };
  var printFit = { cashflowGraph: "none", cashflowTable: "none", yearly: "none", drawReport: "none", capTable: "none", drawsList: "none" };
  var nextIdCounter = 1;

  function genId(prefix) { return prefix + "_" + (nextIdCounter++) + "_" + Math.random().toString(36).slice(2, 7); }

  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("toast--visible");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function () { t.classList.remove("toast--visible"); }, 1800);
  }

  // ================= Apps Script API client =================
  var API_URL_KEY = "cf_apps_script_url";
  var API_TOKEN_KEY = "cf_apps_script_token";
  function getApiUrl() { return localStorage.getItem(API_URL_KEY); }
  function setApiUrl(url) { localStorage.setItem(API_URL_KEY, url.trim()); }
  function getApiToken() { return localStorage.getItem(API_TOKEN_KEY) || ""; }
  function setApiToken(token) { localStorage.setItem(API_TOKEN_KEY, token.trim()); }
  function clearApiUrl() { localStorage.removeItem(API_URL_KEY); localStorage.removeItem(API_TOKEN_KEY); }

  // Apps Script web app responses carry no CORS headers, so fetch()/XHR
  // reading the response gets blocked by the browser even though the
  // request executes fine server-side. Neither JSONP (<script> tag) nor a
  // <form>-to-hidden-<iframe> submission are subject to CORS at all, so we
  // use those instead of fetch for every call.
  var __jsonpCounter = 0;
  function jsonpRequest_(url) {
    return new Promise(function (resolve, reject) {
      var cbName = "cf_jsonp_cb_" + Date.now() + "_" + (++__jsonpCounter);
      var script = document.createElement("script");
      var timeout = setTimeout(function () {
        cleanup();
        reject(new Error("Request to Apps Script backend timed out"));
      }, 20000);
      function cleanup() {
        clearTimeout(timeout);
        delete window[cbName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }
      window[cbName] = function (data) {
        cleanup();
        resolve(data);
      };
      script.onerror = function () {
        cleanup();
        reject(new Error("Could not reach the Apps Script backend (check the URL and that the deployment access is \"Anyone\")"));
      };
      script.src = url + (url.indexOf("?") === -1 ? "?" : "&") + "callback=" + cbName;
      document.body.appendChild(script);
    });
  }

  var __formPostCounter = 0;
  function formPostRequest_(url, fields) {
    return new Promise(function (resolve) {
      var suffix = Date.now() + "_" + (++__formPostCounter);
      var iframe = document.createElement("iframe");
      iframe.name = "cf_form_target_" + suffix;
      iframe.style.display = "none";
      document.body.appendChild(iframe);

      var form = document.createElement("form");
      form.method = "POST";
      form.action = url;
      form.target = iframe.name;
      Object.keys(fields).forEach(function (key) {
        var input = document.createElement("input");
        input.type = "hidden";
        input.name = key;
        input.value = fields[key] == null ? "" : fields[key];
        form.appendChild(input);
      });
      document.body.appendChild(form);

      // We can't read the (cross-origin) iframe's response, so this resolves
      // optimistically once the browser reports the submission completed.
      // Reload the page (or just wait for the next getProject) to confirm.
      iframe.addEventListener("load", function () {
        setTimeout(function () {
          if (form.parentNode) form.parentNode.removeChild(form);
          if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
        }, 1000);
        resolve({ ok: true });
      });
      form.submit();
    });
  }

  function throwIfApiError_(json) {
    if (json && json.error) throw new Error(json.error);
    return json;
  }

  function callApi(action, payload) {
    var url = getApiUrl();
    if (!url) return Promise.reject(new Error("No Apps Script Web App URL configured"));
    var token = getApiToken();

    if (action === "getProject" || action === "loadExampleData") {
      var getUrl = url + (url.indexOf("?") === -1 ? "?" : "&") + "action=" + action + (token ? "&token=" + encodeURIComponent(token) : "");
      return jsonpRequest_(getUrl).then(throwIfApiError_);
    }

    if (action === "saveProject") {
      return formPostRequest_(url, {
        action: "saveProject",
        token: token,
        project: JSON.stringify(payload.project),
      });
    }

    return Promise.reject(new Error("Unknown action: " + action));
  }

  var isDirty = false;
  function updateSaveIndicator() {
    var btn = document.getElementById("saveBtn");
    if (btn) {
      btn.textContent = isDirty ? "Save*" : "Save";
      btn.classList.toggle("save-btn--dirty", isDirty);
    }
    var hamburgerBtn = document.getElementById("hamburgerBtn");
    if (hamburgerBtn) hamburgerBtn.classList.toggle("save-btn--dirty", isDirty);
  }
  function persist() {
    isDirty = true;
    updateSaveIndicator();
  }
  function saveNow() {
    showToast("Saving…");
    callApi("saveProject", { project: project }).then(function () {
      isDirty = false;
      updateSaveIndicator();
      showToast("Saved");
    }).catch(function (err) {
      showToast("Save failed: " + err.message);
    });
  }
  function applyLoadedProject(p) {
    project = p;
    isDirty = false;
    updateSaveIndicator();
    var isEmpty = project.categories.length === 0 && project.lineItems.length === 0 &&
      project.draws.length === 0 && project.capTable.length === 0;
    if (isEmpty) renderEmptyState();
    else render();
  }
  function loadNow() {
    if (isDirty && !window.confirm("You have unsaved changes. Loading will discard them. Continue?")) return;
    showToast("Loading…");
    callApi("getProject").then(function (p) {
      applyLoadedProject(p);
      showToast("Loaded");
    }).catch(function (err) {
      showToast("Load failed: " + err.message);
    });
  }

  function boot() {
    callApi("getProject").then(function (p) {
      applyLoadedProject(p);
    }).catch(function (err) {
      document.getElementById("bootMessage").textContent = "Failed to load: " + err.message;
    });
  }

  function renderEmptyState() {
    document.getElementById("bootMessage").style.display = "none";
    document.getElementById("tabs").innerHTML = "";
    var el = document.getElementById("tabContent");
    el.innerHTML =
      '<div class="section" style="text-align:center; padding: 48px 16px;">' +
        '<h1 style="margin: 0 0 8px; font-size: 22px;">' + esc(project.name) + '</h1>' +
        '<p class="section__intro" style="margin: 0 auto 20px;">This sheet has no cashflow data yet.</p>' +
        '<div style="display:flex; gap:12px; justify-content:center;">' +
          '<button class="secondary-button" id="startBlankBtn">Start blank</button>' +
          '<button class="secondary-button" id="loadExampleBtn">Load La Costa Hotel example</button>' +
        '</div>' +
      '</div>';
    document.getElementById("startBlankBtn").addEventListener("click", function () { render(); });
    document.getElementById("loadExampleBtn").addEventListener("click", function () {
      el.innerHTML = '<p class="section__intro">Loading example data…</p>';
      callApi("loadExampleData").then(function (p) { project = p; render(); }).catch(function (err) {
        alert("Failed to load example data: " + err.message);
      });
    });
  }

  // ================= setup gate (API URL, not Google sign-in) =================
  function showSetupGate() {
    document.getElementById("appRoot").style.display = "none";
    var el = document.getElementById("setupGate");
    el.style.display = "";
    el.innerHTML =
      '<div class="setup-gate"><div class="setup-gate__card">' +
        '<h1>Connect your Apps Script backend</h1>' +
        '<p>Paste the Web App URL from your deployed Apps Script project (Deploy &rarr; Manage deployments &rarr; copy the URL ending in <code>/exec</code>). See the repo README for how to set that up.</p>' +
        '<label class="setup-gate__field">Web App URL<input id="apiUrlInput" placeholder="https://script.google.com/macros/s/AKfycb.../exec" value="' + esc(getApiUrl() || "") + '" /></label>' +
        '<label class="setup-gate__field">Shared token (optional, only if you set API_TOKEN)<input id="apiTokenInput" value="' + esc(getApiToken()) + '" /></label>' +
        '<div id="setupError"></div>' +
        '<button class="secondary-button" id="connectBtn">Connect</button>' +
      '</div></div>';
    document.getElementById("connectBtn").addEventListener("click", function () {
      var urlVal = document.getElementById("apiUrlInput").value.trim();
      var tokenVal = document.getElementById("apiTokenInput").value.trim();
      if (!urlVal) return;
      setApiUrl(urlVal);
      setApiToken(tokenVal);
      var btn = document.getElementById("connectBtn");
      btn.disabled = true; btn.textContent = "Connecting…";
      callApi("getProject").then(function () {
        el.style.display = "none";
        document.getElementById("appRoot").style.display = "";
        document.getElementById("connectionLabel").textContent = "Connected: " + urlVal.slice(0, 48) + (urlVal.length > 48 ? "…" : "");
        boot();
      }).catch(function (err) {
        btn.disabled = false; btn.textContent = "Connect";
        document.getElementById("setupError").innerHTML = '<p class="setup-gate__error">' + esc(err.message) + '</p>';
      });
    });
  }

  document.getElementById("changeUrlBtn").addEventListener("click", function () { showSetupGate(); });

  // ---------- formatting ----------
  function fmtMoney(n, cents) {
    if (n == null || isNaN(n)) return "—";
    return n.toLocaleString("en-US", {
      style: "currency", currency: "USD",
      maximumFractionDigits: cents ? 2 : 0, minimumFractionDigits: cents ? 2 : 0,
    });
  }
  function fmtMonth(iso) {
    var p = iso.split("-").map(Number);
    return new Date(Date.UTC(p[0], p[1] - 1, 1)).toLocaleDateString("en-US", { month: "short", year: "numeric", timeZone: "UTC" });
  }
  function fmtDate(iso) {
    if (!iso) return "—";
    var p = iso.split("-").map(Number);
    return new Date(Date.UTC(p[0], p[1] - 1, p[2])).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", timeZone: "UTC" });
  }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function sum(arr) { return arr.reduce(function (a, b) { return a + b; }, 0); }
  function round(n) { return Math.round(n * 10000) / 10000; }

  // ---------- schedule engine (mirrors backend logic) ----------
  function computeEvenSchedule(startISO, endISO, total) {
    var s = startISO.split("-").map(Number), e = endISO.split("-").map(Number);
    var startKey = s[0] * 12 + (s[1] - 1), endKey = e[0] * 12 + (e[1] - 1);
    if (endKey < startKey) return [];
    var numMonths = endKey - startKey + 1;
    var perMonth = round2(total / numMonths);
    var buckets = [], allocated = 0;
    for (var i = 0; i < numMonths; i++) {
      var isLast = i === numMonths - 1;
      var amount = isLast ? round2(total - allocated) : perMonth;
      allocated += amount;
      var key = startKey + i, y = Math.floor(key / 12), m = key % 12;
      buckets.push({ date: y + "-" + String(m + 1).padStart(2, "0") + "-01", amount: amount });
    }
    return buckets;
  }
  function addMonths(iso, months) {
    var p = iso.split("-").map(Number);
    var totalMonth = p[0] * 12 + (p[1] - 1) + months;
    var newYear = Math.floor(totalMonth / 12), newMonth = totalMonth % 12;
    var daysInMonth = new Date(newYear, newMonth + 1, 0).getDate();
    var day = Math.min(p[2], daysInMonth);
    return newYear + "-" + String(newMonth + 1).padStart(2, "0") + "-" + String(day).padStart(2, "0");
  }
  function generateRecurringDraws(input) {
    var amountEach = input.splitEvenly ? round2(input.totalAmount / input.count) : input.totalAmount;
    var allocated = 0, draws = [];
    for (var i = 0; i < input.count; i++) {
      var isLast = i === input.count - 1;
      var amount = input.splitEvenly ? (isLast ? round2(input.totalAmount - allocated) : amountEach) : amountEach;
      allocated += amount;
      draws.push({ name: input.namePrefix + " " + (input.startIndex + i), date: addMonths(input.startDate, i * input.intervalMonths), amount: amount, source: input.source });
    }
    return draws;
  }

    var endMonth = activeDraw.date.slice(0, 7);
    var startMonth = previousDraw ? monthAfter(previousDraw.date.slice(0, 7)) : (months[0] ? months[0].slice(0, 7) : null);

            periodMonths.forEach(function (m) { drawHtml += '<td class="col-money">' + (li.monthly[m] ? fmtMoney(li.monthly[m]) : "") + "</td>"; });
            drawHtml += '<td class="col-money"><strong>' + (t ? fmtMoney(t) : "") + "</strong></td></tr>";
          });

  // ---------- print layout ----------
  var PAGE_SIZES_IN = { letter: [8.5, 11], a4: [8.27, 11.69], legal: [8.5, 14], tabloid: [11, 17] };
  var ROW_PADDING_PX = { compact: 2, normal: 5, spacious: 9 };
  var printZoom = 100;

  function marginsIn(settings) {
    return { top: settings.marginTopIn, right: settings.marginRightIn, bottom: settings.marginBottomIn, left: settings.marginLeftIn };
  }
  function pageDimensionsPx(settings) {
    var dims = PAGE_SIZES_IN[settings.pageSize].slice();
    if (settings.orientation === "landscape") dims = [dims[1], dims[0]];
    var m = marginsIn(settings);
    var DPI = 96;
    return {
      pageWidthPx: Math.round(dims[0] * DPI),
      pageHeightPx: Math.round(dims[1] * DPI),
      contentWidthPx: Math.round((dims[0] - m.left - m.right) * DPI),
      contentHeightPx: Math.round((dims[1] - m.top - m.bottom) * DPI),
      marginTopPx: Math.round(m.top * DPI),
      marginRightPx: Math.round(m.right * DPI),
      marginBottomPx: Math.round(m.bottom * DPI),
      marginLeftPx: Math.round(m.left * DPI),
    };
  }
  function pageCssSize(settings) {
    if (settings.pageSize === "tabloid") return settings.orientation === "landscape" ? "17in 11in" : "11in 17in";
    var names = { letter: "letter", a4: "A4", legal: "legal" };
    return names[settings.pageSize] + " " + settings.orientation;
  }
  function marginCss(settings) {
    var m = marginsIn(settings);
    return m.top + "in " + m.right + "in " + m.bottom + "in " + m.left + "in";
  }

  function stripIds(node) {
    if (node.removeAttribute) node.removeAttribute("id");
    if (node.querySelectorAll) {
      node.querySelectorAll("[id]").forEach(function (c) { c.removeAttribute("id"); });
    }
  }

  function buildPrintPages(sourceEl, settings) {
    var dims = pageDimensionsPx(settings);
    var container = document.createElement("div");
    container.className = "print-pages";

    var toolbar = document.createElement("div");
    toolbar.className = "print-pages__toolbar";
    var hint = document.createElement("p");
    hint.className = "print-pages__hint";
    toolbar.appendChild(hint);
    var zoomWrap = document.createElement("div");
    zoomWrap.className = "print-pages__zoom";
    zoomWrap.innerHTML =
      '<button id="ppZoomOut">−</button><span id="ppZoomLabel">' + printZoom + '%</span>' +
      '<button id="ppZoomIn">+</button><button id="ppZoomFit">Fit to width</button>';
    toolbar.appendChild(zoomWrap);
    container.appendChild(toolbar);

    var pagesWrap = document.createElement("div");
    pagesWrap.className = "print-pages__pages";
    container.appendChild(pagesWrap);
    var zoomFactor = printZoom / 100;

    // ---- measure a detached clone at real content width, then flatten every section
    // into a list of atomic blocks and individual table rows ("units") in document order.
    // Real pages are built by walking this list and greedily filling each page, so every
    // page contains genuinely separate, correctly-sized DOM (no oversized clipped clones
    // relying on overflow:hidden, which print engines — especially iOS Safari — do not
    // reliably fragment/crop the way on-screen rendering does).
    var measureClone = sourceEl.cloneNode(true);
    stripIds(measureClone);
    measureClone.style.position = "absolute";
    measureClone.style.visibility = "hidden";
    measureClone.style.width = dims.contentWidthPx + "px";
    measureClone.style.left = "-99999px";
    document.body.appendChild(measureClone);

    var runCounter = 0;
    var units = [];

    function isTableWrapper(el) {
      return el.children.length === 1 && el.children[0].tagName === "TABLE";
    }

    function pushTableRun(table, wrapperClassName, isFirstUnitOfSection) {
      var headEl = table.querySelector("thead");
      var bodyEl = table.querySelector("tbody");
      var headRow = headEl ? headEl.querySelector("tr") : null;
      var colWidths = headRow ? Array.from(headRow.children).map(function (c) { return c.offsetWidth; }) : [];
      var totalWidth = colWidths.reduce(function (a, b) { return a + b; }, 0) || table.offsetWidth;
      var run = {
        runId: "run" + (runCounter++),
        tableClassName: table.className,
        wrapperClassName: wrapperClassName || null,
        colgroupHtml: colWidths.length
          ? "<colgroup>" + colWidths.map(function (w) { return '<col style="width:' + w + 'px">'; }).join("") + "</colgroup>"
          : "",
        totalWidth: totalWidth,
        theadHtml: headEl ? headEl.outerHTML : "",
        theadHeight: headEl ? headEl.offsetHeight : 0,
        firstPageDone: false,
      };
      var rows = bodyEl ? Array.from(bodyEl.children) : [];
      if (rows.length === 0) {
        units.push({ type: "row", run: run, html: "", height: 0, sectionStart: isFirstUnitOfSection });
        return;
      }
      rows.forEach(function (tr, idx) {
        units.push({
          type: "row", run: run, html: tr.outerHTML, height: tr.offsetHeight,
          sectionStart: isFirstUnitOfSection && idx === 0,
        });
      });
    }

    Array.from(measureClone.querySelectorAll(".print-fit-section")).forEach(function (section) {
      // Fit-scaled sections (transform:scale applied by applyFitScaling) keep their old
      // all-or-nothing placement: splitting a scaled section into fresh per-row table
      // fragments would silently drop the scaling, since the transform lives on the
      // section wrapper, not on the individual rows/tables inside it. Horizontal overflow
      // for fit-height sections is handled separately (continuation pages), not here.
      if (section.style.transform) {
        var sizer = section.parentElement && section.parentElement.children.length === 1 ? section.parentElement : section;
        units.push({ type: "atomic", html: sizer.outerHTML, height: sizer.offsetHeight, sectionStart: true });
        return;
      }
      var entries = Array.from(section.children).map(function (child) {
        if (child.tagName === "TABLE") return { kind: "table", table: child, wrapperClassName: null, node: child };
        if (isTableWrapper(child)) return { kind: "table", table: child.children[0], wrapperClassName: child.className, node: child };
        return { kind: "atomic", node: child };
      });
      if (!entries.some(function (e) { return e.kind === "table"; })) {
        units.push({ type: "atomic", html: section.outerHTML, height: section.offsetHeight, sectionStart: true });
        return;
      }
      var isFirstUnit = true;
      entries.forEach(function (e) {
        if (e.kind === "table") pushTableRun(e.table, e.wrapperClassName, isFirstUnit);
        else units.push({ type: "atomic", html: e.node.outerHTML, height: e.node.offsetHeight, sectionStart: isFirstUnit });
        isFirstUnit = false;
      });
    });

    document.body.removeChild(measureClone);

    // ---- page-fill walk ----
    // A tiny safety margin keeps content from landing exactly flush with the page
    // boundary: print engines can round sub-pixel layout units unfavorably at an exact
    // edge and push a near-empty remainder onto a phantom extra page.
    var PAGE_SAFETY_MARGIN_PX = 4;
    var pageContentBudget = Math.max(0, dims.contentHeightPx - PAGE_SAFETY_MARGIN_PX);
    var pageEls = [];
    var currentPage = null;
    var pageIsEmpty = true;
    var remaining = 0;
    var currentTbody = null;
    var currentRunId = null;

    function newPage() {
      currentPage = document.createElement("div");
      currentPage.className = "print-page__content";
      pageEls.push(currentPage);
      pageIsEmpty = true;
      remaining = pageContentBudget;
      currentTbody = null;
      currentRunId = null;
    }
    newPage();

    function appendAtomicHtml(html) {
      var tmp = document.createElement("div");
      tmp.innerHTML = html;
      if (tmp.firstElementChild) currentPage.appendChild(tmp.firstElementChild);
      pageIsEmpty = false;
    }

    function openRunOnCurrentPage(run, headerCost) {
      var wrapperEl = currentPage;
      if (run.wrapperClassName) {
        wrapperEl = document.createElement("div");
        wrapperEl.className = run.wrapperClassName;
        currentPage.appendChild(wrapperEl);
      }
      var table = document.createElement("table");
      table.className = run.tableClassName;
      table.style.tableLayout = "fixed";
      if (run.totalWidth) table.style.width = run.totalWidth + "px";
      var showHead = headerCost > 0;
      table.innerHTML = run.colgroupHtml + (showHead ? run.theadHtml : "") + "<tbody></tbody>";
      wrapperEl.appendChild(table);
      currentTbody = table.querySelector("tbody");
      currentRunId = run.runId;
      pageIsEmpty = false;
      remaining -= headerCost;
      run.firstPageDone = true;
    }

    units.forEach(function (u) {
      if (settings.pageBreakPerSection && u.sectionStart && !pageIsEmpty) newPage();

      if (u.type === "atomic") {
        if (u.height > remaining && !pageIsEmpty) newPage();
        appendAtomicHtml(u.html);
        remaining -= u.height;
        currentTbody = null;
        currentRunId = null;
        return;
      }

      var needsNewRun = currentRunId !== u.run.runId;
      var headerCost = needsNewRun && (!u.run.firstPageDone || settings.repeatHeader) ? u.run.theadHeight : 0;
      if (headerCost + u.height > remaining && !pageIsEmpty) {
        newPage();
        needsNewRun = true;
        headerCost = !u.run.firstPageDone || settings.repeatHeader ? u.run.theadHeight : 0;
      }
      if (needsNewRun) openRunOnCurrentPage(u.run, headerCost);
      if (u.html) currentTbody.insertAdjacentHTML("beforeend", u.html);
      remaining -= u.height;
      pageIsEmpty = false;
    });

    var numPages = pageEls.length;

    hint.textContent = numPages + " page" + (numPages > 1 ? "s" : "") + " at this page size — approximate; printed table headers repeat on every page automatically.";

    for (var i = 0; i < numPages; i++) {
      var pageOuter = document.createElement("div");
      pageOuter.className = "print-page-outer";
      pageOuter.style.width = (dims.pageWidthPx * zoomFactor) + "px";
      pageOuter.style.height = (dims.pageHeightPx * zoomFactor) + "px";
      pageOuter.style.setProperty("--natural-width", dims.contentWidthPx + "px");
      pageOuter.style.setProperty("--natural-height", dims.contentHeightPx + "px");

      var pageDiv = document.createElement("div");
      pageDiv.className = "print-page";
      pageDiv.style.width = dims.pageWidthPx + "px";
      pageDiv.style.height = dims.pageHeightPx + "px";
      pageDiv.style.transform = "scale(" + zoomFactor + ")";
      pageDiv.style.transformOrigin = "top left";

      var viewport = document.createElement("div");
      viewport.className = "print-page__viewport";
      viewport.style.width = dims.contentWidthPx + "px";
      viewport.style.height = dims.contentHeightPx + "px";
      viewport.style.marginTop = dims.marginTopPx + "px";
      viewport.style.marginRight = dims.marginRightPx + "px";
      viewport.style.marginBottom = dims.marginBottomPx + "px";
      viewport.style.marginLeft = dims.marginLeftPx + "px";

      viewport.appendChild(pageEls[i]);
      pageDiv.appendChild(viewport);

      var label = document.createElement("div");
      label.className = "print-page__label";
      label.textContent = "Page " + (i + 1) + " of " + numPages;
      pageDiv.appendChild(label);

      pageOuter.appendChild(pageDiv);
      pagesWrap.appendChild(pageOuter);
    }

    toolbar.querySelector("#ppZoomOut").addEventListener("click", function () {
      printZoom = Math.max(25, printZoom - 10);
      render();
    });
    toolbar.querySelector("#ppZoomIn").addEventListener("click", function () {
      printZoom = Math.min(200, printZoom + 10);
      render();
    });
    toolbar.querySelector("#ppZoomFit").addEventListener("click", function () {
      var available = window.innerWidth - 64;
      printZoom = Math.max(25, Math.min(200, Math.floor((available / dims.pageWidthPx) * 100)));
      render();
    });

    return container;
  }

  function getLineItemSchedule(item) {
    if (item.scheduleMode === "CUSTOM") {
      return item.payments.slice().sort(function (a, b) { return a.date.localeCompare(b.date); })
        .map(function (p) { return { date: p.date.slice(0, 10), amount: p.amount }; });
    }
    if (!item.startDate || !item.endDate) return [];
    return computeEvenSchedule(item.startDate.slice(0, 10), item.endDate.slice(0, 10), item.totalBudget);
  }
  function computeCapTable(members) {
    var totals = members.map(function (m) {
      return { member: m, totalContributed: sum(m.contributions.map(function (c) { return c.amount; })),
        totalDistributed: sum(m.distributions.map(function (d) { return d.amount; })) };
    });
    var manualTotalPercent = sum(members.filter(function (m) { return m.ownershipPercent != null; }).map(function (m) { return m.ownershipPercent; }));
    var remainingPercent = Math.max(0, 100 - manualTotalPercent);
    var proRataBase = sum(totals.filter(function (t) { return t.member.ownershipPercent == null; }).map(function (t) { return t.totalContributed; }));
    return totals.map(function (t) {
      var ownershipPercent;
      if (t.member.ownershipPercent != null) ownershipPercent = t.member.ownershipPercent;
      else if (proRataBase > 0) ownershipPercent = (t.totalContributed / proRataBase) * remainingPercent;
      else ownershipPercent = 0;
      return {
        id: t.member.id, name: t.member.name, role: t.member.role,
        totalContributed: t.totalContributed, totalDistributed: t.totalDistributed,
        netPosition: t.totalContributed - t.totalDistributed,
        ownershipPercent: round(ownershipPercent), ownershipIsManual: t.member.ownershipPercent != null,
      };
    });
  }
  function autoSplitAmount(rows, totalAmount) {
    var totalPercent = sum(rows.map(function (r) { return r.ownershipPercent; }));
    if (totalPercent <= 0) return rows.map(function (r) { return { memberId: r.id, amount: 0 }; });
    var allocated = 0;
    return rows.map(function (r, i) {
      var isLast = i === rows.length - 1;
      var amount = isLast ? round2(totalAmount - allocated) : round2((r.ownershipPercent / totalPercent) * totalAmount);
      allocated += amount;
      return { memberId: r.id, amount: amount };
    });
  }

  function buildSummary(proj) {
    var itemsWithSchedule = proj.lineItems.map(function (li) { return { li: li, schedule: getLineItemSchedule(li) }; });
    var minKey = null, maxKey = null;
    function consider(iso) {
      var p = iso.split("-").map(Number), k = p[0] * 12 + (p[1] - 1);
      minKey = minKey === null ? k : Math.min(minKey, k);
      maxKey = maxKey === null ? k : Math.max(maxKey, k);
    }
    itemsWithSchedule.forEach(function (x) { x.schedule.forEach(function (b) { consider(b.date.slice(0, 7) + "-01"); }); });
    proj.draws.forEach(function (d) { consider(d.date.slice(0, 10)); });
    var months = [];
    if (minKey !== null) for (var k = minKey; k <= maxKey; k++) { var y = Math.floor(k / 12), m = k % 12; months.push(y + "-" + String(m + 1).padStart(2, "0") + "-01"); }

    function monthlyMapFor(schedule) {
      var map = {};
      schedule.forEach(function (b) { var key = b.date.slice(0, 7) + "-01"; map[key] = (map[key] || 0) + b.amount; });
      return map;
    }

    var categoryList = proj.categories.map(function (c) { return { id: c.id, name: c.name }; }).concat([{ id: null, name: "Uncategorized" }]);
    var categories = categoryList.map(function (cat) {
      var items = itemsWithSchedule.filter(function (x) { return x.li.categoryId === cat.id; });
      if (items.length === 0) return null;
      var lineItems = items.map(function (x) {
        return { id: x.li.id, code: x.li.code, description: x.li.description, totalBudget: x.li.totalBudget,
          scheduleMode: x.li.scheduleMode, monthly: monthlyMapFor(x.schedule) };
      });
      var subtotal = {}, subtotalTotal = 0;
      lineItems.forEach(function (lo) {
        Object.keys(lo.monthly).forEach(function (mo) { subtotal[mo] = (subtotal[mo] || 0) + lo.monthly[mo]; });
        subtotalTotal += lo.totalBudget;
      });
      return { id: cat.id, name: cat.name, lineItems: lineItems, subtotal: subtotal, subtotalTotal: subtotalTotal };
    }).filter(function (c) { return c !== null; });

    var grandMonthly = {}, grandTotal = 0;
    categories.forEach(function (cat) {
      Object.keys(cat.subtotal).forEach(function (mo) { grandMonthly[mo] = (grandMonthly[mo] || 0) + cat.subtotal[mo]; });
      grandTotal += cat.subtotalTotal;
    });

    var capTableRows = computeCapTable(proj.capTable);
    return {
      months: months, categories: categories, grandTotal: { monthly: grandMonthly, total: grandTotal },
      draws: proj.draws, capTable: capTableRows,
      equityTotals: {
        totalContributed: sum(capTableRows.map(function (r) { return r.totalContributed; })),
        totalDistributed: sum(capTableRows.map(function (r) { return r.totalDistributed; })),
      },
    };
  }

  // ---------- CSV export ----------
  var EXPORT_SECTION_LABELS = {
    project: "Project info",
    lineItems: "Line items",
    draws: "Draws",
    capTable: "Cap table",
    summary: "Cash flow summary (monthly grid)",
  };
  var EXPORT_SECTION_ORDER = ["project", "lineItems", "draws", "capTable", "summary"];

  function csvEscape(value) {
    var s = value == null ? "" : String(value);
    if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }
  function toCsvRow(cells) { return cells.map(csvEscape).join(","); }
  function money(n) { return Math.round(((n || 0) + Number.EPSILON) * 100) / 100; }

  function buildProjectCsv(proj) {
    return [
      toCsvRow(["Field", "Value"]),
      toCsvRow(["Name", proj.name]),
      toCsvRow(["Client", proj.client]),
      toCsvRow(["Address", proj.address]),
      toCsvRow(["Description", proj.description]),
      toCsvRow(["Date", proj.projectDate]),
    ].join("\n");
  }
  function buildLineItemsCsv(proj) {
    function catName(id) { var c = proj.categories.filter(function (x) { return x.id === id; })[0]; return c ? c.name : ""; }
    var rows = [toCsvRow(["Category", "Code", "Description", "Budget", "Schedule Mode", "Start Date", "End Date", "Payment Date", "Payment Amount"])];
    proj.lineItems.forEach(function (li) {
      if (li.scheduleMode === "CUSTOM" && li.payments.length) {
        li.payments.forEach(function (p) {
          rows.push(toCsvRow([catName(li.categoryId), li.code, li.description, money(li.totalBudget), li.scheduleMode, "", "", p.date, money(p.amount)]));
        });
      } else {
        rows.push(toCsvRow([catName(li.categoryId), li.code, li.description, money(li.totalBudget), li.scheduleMode, li.startDate, li.endDate, "", ""]));
      }
    });
    return rows.join("\n");
  }
  function buildDrawsCsv(proj) {
    var rows = [toCsvRow(["Name", "Date", "Amount", "Source"])];
    proj.draws.forEach(function (d) { rows.push(toCsvRow([d.name, d.date, money(d.amount), d.source])); });
    return rows.join("\n");
  }
  function buildCapTableCsv(proj) {
    var rows = [toCsvRow(["Member", "Role", "Ownership %", "Type", "Date", "Amount", "Note"])];
    proj.capTable.forEach(function (m) {
      if (!m.contributions.length && !m.distributions.length) {
        rows.push(toCsvRow([m.name, m.role, m.ownershipPercent, "", "", "", ""]));
      }
      m.contributions.forEach(function (c) { rows.push(toCsvRow([m.name, m.role, m.ownershipPercent, "Contribution", c.date, money(c.amount), c.note])); });
      m.distributions.forEach(function (d) { rows.push(toCsvRow([m.name, m.role, m.ownershipPercent, "Distribution", d.date, money(d.amount), d.note])); });
    });
    return rows.join("\n");
  }
  function buildSummaryCsv(summary) {
    var rows = [toCsvRow(["Line item", "Budget"].concat(summary.months))];
    summary.categories.forEach(function (cat) {
      rows.push(toCsvRow([cat.name, ""].concat(summary.months.map(function () { return ""; }))));
      cat.lineItems.forEach(function (li) {
        rows.push(toCsvRow([(li.code ? li.code + " " + li.description : li.description), money(li.totalBudget)]
          .concat(summary.months.map(function (m) { return money(li.monthly[m]); }))));
      });
      rows.push(toCsvRow(["Total " + cat.name, money(cat.subtotalTotal)].concat(summary.months.map(function (m) { return money(cat.subtotal[m]); }))));
    });
    rows.push(toCsvRow(["Grand Total", money(summary.grandTotal.total)].concat(summary.months.map(function (m) { return money(summary.grandTotal.monthly[m]); }))));
    return rows.join("\n");
  }
  function buildCombinedCsv(proj, summary, sections) {
    var parts = [];
    sections.forEach(function (s) {
      parts.push("# " + EXPORT_SECTION_LABELS[s]);
      if (s === "project") parts.push(buildProjectCsv(proj));
      if (s === "lineItems") parts.push(buildLineItemsCsv(proj));
      if (s === "draws") parts.push(buildDrawsCsv(proj));
      if (s === "capTable") parts.push(buildCapTableCsv(proj));
      if (s === "summary" && summary) parts.push(buildSummaryCsv(summary));
      parts.push("");
    });
    return parts.join("\n");
  }
  function downloadCsv(filename, content) {
    var blob = new Blob([content], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function applyFitScaling(wrap, settings, fit) {
    var hasAnyFit = Object.keys(fit).some(function (k) { return fit[k] && fit[k] !== "none"; });
    if (!hasAnyFit) return;
    var dims = pageDimensionsPx(settings);

    wrap.style.position = "absolute";
    wrap.style.visibility = "hidden";
    wrap.style.left = "-99999px";
    wrap.style.width = dims.contentWidthPx + "px";
    document.body.appendChild(wrap);

    Array.from(wrap.querySelectorAll("[data-fit-key]")).forEach(function (el) {
      var mode = fit[el.getAttribute("data-fit-key")];
      if (!mode || mode === "none") return;
      var naturalWidth = el.scrollWidth;
      var naturalHeight = el.scrollHeight;
      var factor = 1;
      if (mode === "width" && naturalWidth > 0) factor = Math.min(1, dims.contentWidthPx / naturalWidth);
      else if (mode === "height" && naturalHeight > 0) factor = Math.min(1, dims.contentHeightPx / naturalHeight);
      if (factor < 1) {
        var sizer = document.createElement("div");
        sizer.style.width = (naturalWidth * factor) + "px";
        sizer.style.height = (naturalHeight * factor) + "px";
        sizer.style.overflow = "hidden";
        el.style.width = naturalWidth + "px";
        el.style.transform = "scale(" + factor + ")";
        el.style.transformOrigin = "top left";
        el.parentNode.insertBefore(sizer, el);
        sizer.appendChild(el);
      }
    });

    document.body.removeChild(wrap);
    wrap.style.position = "";
    wrap.style.visibility = "";
    wrap.style.left = "";
    wrap.style.width = "";
  }

  function renderPrintableReport(el) {
    var summary = buildSummary(project);
    if (summary.months.length === 0) { el.appendChild(emptyScheduleSection()); return; }
    var wrap = document.createElement("div");

      var cashflowWrap = buildCashflowSection(summary, true, printSections);
      if (cashflowWrap.children.length) wrap.appendChild(cashflowWrap);
    }
    var summaryWrap = buildSummarySection(summary, true, printSections);
    if (summaryWrap.children.length) wrap.appendChild(summaryWrap);
    applyFitScaling(wrap, printSettings, printFit);
    var pages = buildPrintPages(wrap, printSettings);
    el.appendChild(pages);
  }

  function buildChart(months, monthly) {
    var w = 1200, h = 220, padL = 70, padB = 24, padT = 10, padR = 10;
    var data = months.map(function (m) { return monthly[m] || 0; });
    var maxVal = Math.max.apply(null, data.concat([1]));
    var niceMax = Math.pow(10, Math.floor(Math.log10(maxVal))) * Math.ceil(maxVal / Math.pow(10, Math.floor(Math.log10(maxVal))));
    var plotW = w - padL - padR, plotH = h - padT - padB;
    var barW = Math.max(2, (plotW / data.length) * 0.62);
    var gap = plotW / data.length;

    var svgNS = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("viewBox", "0 0 " + w + " " + h);
    svg.setAttribute("width", "100%");
    svg.setAttribute("height", h);
    svg.style.display = "block";
    svg.style.overflow = "visible";

    [0, 0.25, 0.5, 0.75, 1].forEach(function (frac) {
      var y = padT + plotH * (1 - frac);
      var line = document.createElementNS(svgNS, "line");
      line.setAttribute("x1", padL); line.setAttribute("x2", w - padR);
      line.setAttribute("y1", y); line.setAttribute("y2", y);
      line.setAttribute("class", "gridline");
      svg.appendChild(line);
      var label = document.createElementNS(svgNS, "text");
      label.setAttribute("x", padL - 8); label.setAttribute("y", y + 3);
      label.setAttribute("text-anchor", "end"); label.setAttribute("class", "axis-label");
      label.textContent = fmtMoney(niceMax * frac);
      svg.appendChild(label);
    });

    var tooltip = document.getElementById("chartTooltip");
    data.forEach(function (val, i) {
      var barH = niceMax > 0 ? (val / niceMax) * plotH : 0;
      var x = padL + gap * i + (gap - barW) / 2;
      var y = padT + plotH - barH;
      var rect = document.createElementNS(svgNS, "rect");
      rect.setAttribute("x", x); rect.setAttribute("y", y);
      rect.setAttribute("width", barW); rect.setAttribute("height", Math.max(barH, 0));
      rect.setAttribute("rx", 2.5);
      rect.setAttribute("class", "bar");
      rect.style.cursor = "pointer";
      rect.addEventListener("mousemove", function (ev) {
        tooltip.style.display = "block";
        tooltip.innerHTML = "<div style='color:var(--text-muted);margin-bottom:2px'>" + fmtMonth(months[i]) + "</div><div style='font-variant-numeric:tabular-nums'>" + fmtMoney(val) + "</div>";
        tooltip.style.left = ev.pageX + 12 + "px";
        tooltip.style.top = ev.pageY - 36 + "px";
      });
      rect.addEventListener("mouseleave", function () { tooltip.style.display = "none"; });
      svg.appendChild(rect);
      if (i % Math.max(1, Math.floor(data.length / 12)) === 0) {
        var xl = document.createElementNS(svgNS, "text");
        xl.setAttribute("x", x + barW / 2); xl.setAttribute("y", h - 6);
        xl.setAttribute("text-anchor", "middle"); xl.setAttribute("class", "axis-label");
        xl.textContent = fmtMonth(months[i]);
        svg.appendChild(xl);
      }
    });

    var holder = document.createElement("div");
    holder.style.position = "relative";
    holder.appendChild(svg);
    return holder;
  }

  function scheduleEditorHtml(li) {

    var html = '<div class="schedule-editor">' +
      '<div class="schedule-editor__mode">' +
        '<label><input type="radio" name="mode-' + li.id + '"' + (isEven ? " checked" : "") + ' data-mode-radio="' + li.id + '" value="EVEN" /> Spread evenly between dates</label>' +

      html += '<div class="schedule-editor__even">' +
        '<label>Start<input type="date" value="' + esc(li.startDate || "") + '" data-even-field="startDate" data-item-id="' + li.id + '" /></label>' +
        '<label>End<input type="date" value="' + esc(li.endDate || "") + '" data-even-field="endDate" data-item-id="' + li.id + '" /></label>';
      if (li.startDate && li.endDate) {
        html += '<span class="schedule-editor__hint">' + schedule.length + " monthly payment" + (schedule.length === 1 ? "" : "s") + " of " + fmtMoney(li.totalBudget / Math.max(schedule.length, 1)) + " each</span>";
      }

    } else {

      html += '<div class="schedule-editor__custom"><table class="mini-table"><thead><tr><th>Date</th><th>Amount</th><th></th></tr></thead><tbody>';
      li.payments.slice().sort(function (a, b) { return a.date.localeCompare(b.date); }).forEach(function (p) {
        html += "<tr><td>" + fmtDate(p.date) + "</td><td>" + fmtMoney(p.amount, true) + '</td><td><button class="link-button" data-remove-payment="' + li.id + "|" + p.id + '">remove</button></td></tr>';
      });
      html += '<tr><td><input type="date" data-new-payment-date="' + li.id + '" /></td><td><input type="number" placeholder="0.00" data-new-payment-amount="' + li.id + '" /></td>' +
        '<td><button class="link-button" data-add-payment="' + li.id + '">add</button></td></tr></tbody></table>';
      if (Math.abs(variance) > 0.01) {
        html += '<div class="schedule-editor__variance">Payments total ' + fmtMoney(scheduleTotal, true) + ", budget is " + fmtMoney(li.totalBudget, true) + " (" + (variance > 0 ? "+" : "") + fmtMoney(variance, true) + ")</div>";
      }
      html += "</div>";
    }
    html += "</div>";
    return html;

  function findLineItem(id) { return project.lineItems.filter(function (li) { return li.id === id; })[0]; }

  function wireLineItemEvents(root) {
    root.querySelectorAll("[data-item-field]").forEach(function (input) {
      input.addEventListener("change", function () {
        var li = findLineItem(input.getAttribute("data-item-id"));
        var field = input.getAttribute("data-item-field");
        if (field === "totalBudget") li[field] = Number(input.value) || 0;
        else if (field === "categoryId") li[field] = input.value || null;
        else li[field] = input.value;
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-cat-rename]").forEach(function (input) {
      input.addEventListener("change", function () {
        var cat = project.categories.filter(function (c) { return c.id === input.getAttribute("data-cat-rename"); })[0];
        cat.name = input.value;
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-cat-delete]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-cat-delete");
        var hasItems = project.lineItems.some(function (li) { return li.categoryId === id; });
        if (hasItems) { alert("Move or delete line items out of this category first."); return; }
        project.categories = project.categories.filter(function (c) { return c.id !== id; });
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-add-item]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var catId = btn.getAttribute("data-add-item") || null;
        project.lineItems.push({ id: genId("li"), categoryId: catId, code: "", description: "New line item", totalBudget: 0, scheduleMode: "EVEN", startDate: null, endDate: null, sortOrder: project.lineItems.length, payments: [] });
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-delete-item]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-delete-item");
        var li = findLineItem(id);
        if (confirm('Delete "' + li.description + '"?')) {
          project.lineItems = project.lineItems.filter(function (x) { return x.id !== id; });
          render();
          persist();
        }
      });
    });
    root.querySelectorAll("[data-toggle-schedule]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-toggle-schedule");
        expandedLineItemId = expandedLineItemId === id ? null : id;
        render();
      });
    });
    root.querySelectorAll("[data-mode-radio]").forEach(function (radio) {
      radio.addEventListener("change", function () {
        findLineItem(radio.getAttribute("data-mode-radio")).scheduleMode = radio.value;
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-even-field]").forEach(function (input) {
      input.addEventListener("change", function () {
        findLineItem(input.getAttribute("data-item-id"))[input.getAttribute("data-even-field")] = input.value;
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-add-payment]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-add-payment");
        var dateInput = root.querySelector('[data-new-payment-date="' + id + '"]');
        var amountInput = root.querySelector('[data-new-payment-amount="' + id + '"]');
        if (!dateInput.value || !amountInput.value) return;
        findLineItem(id).payments.push({ id: genId("pay"), date: dateInput.value, amount: Number(amountInput.value) });
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-remove-payment]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var parts = btn.getAttribute("data-remove-payment").split("|");
        var li = findLineItem(parts[0]);
        li.payments = li.payments.filter(function (p) { return p.id !== parts[1]; });
        render();
        persist();
      });
    });
  }

        customWrap.style.display = intervalSelect.value === "0" ? "" : "none";

        var intervalMonths = intervalChoice === 0 ? Math.max(1, Number(wrap.querySelector("#genCustomMonths").value) || 1) : intervalChoice;

          namePrefix: wrap.querySelector("#genNamePrefix").value || "Draw",

        showDrawGenerator = false;
        render();
        persist();
      });
    }
  }
