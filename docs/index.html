          '<option value="GP"' + (member.role === "GP" ? " selected" : "") + ">GP</option>" +
          '<option value="LP"' + (member.role === "LP" ? " selected" : "") + ">LP</option></select></td>" +
        '<td class="col-money"><input type="number" class="editable-number" placeholder="auto" value="' + (member.ownershipPercent == null ? "" : member.ownershipPercent) + '" data-member-field="ownershipPercent" data-member-id="' + member.id + '" />' +
          (member.ownershipPercent == null ? '<span class="auto-badge">auto: ' + computed.ownershipPercent.toFixed(2) + "%</span>" : "") + "</td>" +
        '<td class="col-money">' + fmtMoney(computed.totalContributed) + "</td>" +
        '<td class="col-money">' + fmtMoney(computed.totalDistributed) + "</td>" +
        '<td class="col-money">' + fmtMoney(computed.netPosition) + "</td>" +
        '<td class="col-actions"><button class="link-button" data-toggle-ledger="' + member.id + '">' + (expandedMemberId === member.id ? "▾ ledger" : "▸ ledger") + "</button> " +
          '<button class="link-button link-button--danger" data-member-delete="' + member.id + '">delete</button></td>' +
        "</tr>";
      if (expandedMemberId === member.id) {
        html += '<tr class="schedule-row"><td colspan="7">' + ledgerHtml(member) + "</td></tr>";
      }
    });

    html += '<tr class="add-row"><td colspan="7"><button class="link-button" id="addMemberBtn">+ add member</button></td></tr>' +
      '<tr class="total-row"><td>Total</td><td></td><td class="col-money">' + sum(summary.capTable.map(function (r) { return r.ownershipPercent; })).toFixed(2) + '%</td>' +
      '<td class="col-money">' + fmtMoney(summary.equityTotals.totalContributed) + '</td>' +
      '<td class="col-money">' + fmtMoney(summary.equityTotals.totalDistributed) + '</td>' +
      '<td class="col-money">' + fmtMoney(summary.equityTotals.totalContributed - summary.equityTotals.totalDistributed) + "</td><td></td></tr></tbody></table>";

    html += '<div class="auto-split"><h3>Adjust member draws — split a distribution across all members</h3>' +
      '<div class="auto-split__controls">' +
      '<label>Date<input type="date" id="splitDate" value="' + new Date().toISOString().slice(0, 10) + '" /></label>' +
      '<label>Total amount<input type="number" id="splitAmount" placeholder="0.00" /></label>' +
      '<button class="secondary-button" id="splitBtn">Split by ownership %</button>' +
      "</div></div>";

    wrap.innerHTML = html;
    el.appendChild(wrap);
    wireCapTableEvents(wrap, summary);
  }

  function ledgerHtml(member) {
    var html = '<div class="ledger"><div class="ledger__column"><h4>Contributions</h4><table class="mini-table"><tbody>';
    member.contributions.forEach(function (c) {
      html += "<tr><td>" + fmtDate(c.date) + "</td><td>" + fmtMoney(c.amount, true) + "</td><td>" + esc(c.note || "") + '</td><td><button class="link-button" data-remove-contribution="' + member.id + "|" + c.id + '">remove</button></td></tr>';
    });
    html += '<tr><td><input type="date" data-new-contribution-date="' + member.id + '" /></td><td><input type="number" placeholder="0.00" data-new-contribution-amount="' + member.id + '" /></td>' +
      '<td colspan="2"><button class="link-button" data-add-contribution="' + member.id + '">add</button></td></tr></tbody></table></div>';
    html += '<div class="ledger__column"><h4>Distributions (draws)</h4><table class="mini-table"><tbody>';
    member.distributions.forEach(function (d) {
      html += "<tr><td>" + fmtDate(d.date) + "</td><td>" + fmtMoney(d.amount, true) + "</td><td>" + esc(d.note || "") + '</td><td><button class="link-button" data-remove-distribution="' + member.id + "|" + d.id + '">remove</button></td></tr>';
    });
    html += '<tr><td><input type="date" data-new-distribution-date="' + member.id + '" /></td><td><input type="number" placeholder="0.00" data-new-distribution-amount="' + member.id + '" /></td>' +
      '<td colspan="2"><button class="link-button" data-add-distribution="' + member.id + '">add</button></td></tr></tbody></table></div></div>';
    return html;
  }

  function findMember(id) { return project.capTable.filter(function (m) { return m.id === id; })[0]; }

  function wireCapTableEvents(root, summary) {
    root.querySelectorAll("[data-member-field]").forEach(function (input) {
      input.addEventListener("change", function () {
        var member = findMember(input.getAttribute("data-member-id"));
        var field = input.getAttribute("data-member-field");
        if (field === "ownershipPercent") member[field] = input.value === "" ? null : Number(input.value);
        else member[field] = input.value;
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-member-delete]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-member-delete");
        var m = findMember(id);
        if (confirm('Remove "' + m.name + '" from the cap table?')) {
          project.capTable = project.capTable.filter(function (x) { return x.id !== id; });
          render();
          persist();
        }
      });
    });
    root.querySelectorAll("[data-toggle-ledger]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-toggle-ledger");
        expandedMemberId = expandedMemberId === id ? null : id;
        render();
      });
    });
    var addMemberBtn = root.querySelector("#addMemberBtn");
    if (addMemberBtn) addMemberBtn.addEventListener("click", function () {
      project.capTable.push({ id: genId("member"), name: "Member " + (project.capTable.length + 1), role: "LP", ownershipPercent: null, sortOrder: project.capTable.length, contributions: [], distributions: [] });
      render();
      persist();
    });
    root.querySelectorAll("[data-add-contribution]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-add-contribution");
        var dateInput = root.querySelector('[data-new-contribution-date="' + id + '"]');
        var amountInput = root.querySelector('[data-new-contribution-amount="' + id + '"]');
        if (!amountInput.value) return;
        findMember(id).contributions.push({ id: genId("contrib"), date: dateInput.value || new Date().toISOString().slice(0, 10), amount: Number(amountInput.value), note: "" });
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-remove-contribution]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var parts = btn.getAttribute("data-remove-contribution").split("|");
        var m = findMember(parts[0]);
        m.contributions = m.contributions.filter(function (c) { return c.id !== parts[1]; });
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-add-distribution]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var id = btn.getAttribute("data-add-distribution");
        var dateInput = root.querySelector('[data-new-distribution-date="' + id + '"]');
        var amountInput = root.querySelector('[data-new-distribution-amount="' + id + '"]');
        if (!amountInput.value) return;
        findMember(id).distributions.push({ id: genId("dist"), date: dateInput.value || new Date().toISOString().slice(0, 10), amount: Number(amountInput.value), note: "" });
        render();
        persist();
      });
    });
    root.querySelectorAll("[data-remove-distribution]").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var parts = btn.getAttribute("data-remove-distribution").split("|");
        var m = findMember(parts[0]);
        m.distributions = m.distributions.filter(function (d) { return d.id !== parts[1]; });
        render();
        persist();
      });
    });
    var splitBtn = root.querySelector("#splitBtn");
    if (splitBtn) splitBtn.addEventListener("click", function () {
      var date = root.querySelector("#splitDate").value;
      var amount = Number(root.querySelector("#splitAmount").value);
      if (!amount || amount <= 0) return;
      var splits = autoSplitAmount(summary.capTable, amount);
      splits.forEach(function (s) {
        if (s.amount === 0) return;
        findMember(s.memberId).distributions.push({ id: genId("dist"), date: date, amount: s.amount, note: "Auto-split distribution" });
      });
      render();
      persist();
    });
  }

  // ---------- theme picker ----------
  var THEME_MODES = [["system", "System"], ["light", "Light"], ["dark", "Dark"]];
  var THEME_ACCENTS = ["blue", "green", "purple", "orange", "rose"];
  function getThemeMode() { return localStorage.getItem("cf-theme-mode") || "system"; }
  function getThemeAccent() { return localStorage.getItem("cf-theme-accent") || "blue"; }
  function setThemeMode(mode) {
    localStorage.setItem("cf-theme-mode", mode);
    if (mode === "system") document.documentElement.removeAttribute("data-theme");
    else document.documentElement.setAttribute("data-theme", mode);
  }
  function setThemeAccent(accent) {
    localStorage.setItem("cf-theme-accent", accent);
    document.documentElement.setAttribute("data-accent", accent);
  }
  function renderThemePanel() {
    var panel = document.getElementById("themePickerPanel");
    var mode = getThemeMode(), accent = getThemeAccent();
    var html = '<p class="theme-picker__title">Mode</p><div class="theme-picker__modes">';
    THEME_MODES.forEach(function (m) {
      html += '<button class="theme-picker__mode-btn' + (mode === m[0] ? " theme-picker__mode-btn--active" : "") + '" data-mode="' + m[0] + '">' + m[1] + "</button>";
    });
    html += '</div><p class="theme-picker__title">Accent color</p><div class="theme-picker__accents">';
    THEME_ACCENTS.forEach(function (a) {
      html += '<button class="theme-picker__swatch theme-picker__swatch--' + a + (accent === a ? " theme-picker__swatch--active" : "") + '" data-accent="' + a + '" aria-label="' + a + '" title="' + a + '"></button>';
    });
    html += "</div>";
    panel.innerHTML = html;
    panel.querySelectorAll("[data-mode]").forEach(function (btn) {
      btn.addEventListener("click", function () { setThemeMode(btn.getAttribute("data-mode")); renderThemePanel(); });
    });
    panel.querySelectorAll("[data-accent]").forEach(function (btn) {
      btn.addEventListener("click", function () { setThemeAccent(btn.getAttribute("data-accent")); renderThemePanel(); });
    });
  }
  document.getElementById("themePickerBtn").addEventListener("click", function () {
    var panel = document.getElementById("themePickerPanel");
    var isOpen = panel.style.display !== "none";
    if (isOpen) { panel.style.display = "none"; return; }
    renderThemePanel();
    panel.style.display = "flex";
  });

  // ---------- export csv ----------
  var exportSections = { project: true, lineItems: true, draws: true, capTable: true, summary: true };
  function renderExportPanel() {
    var panel = document.getElementById("exportCsvPanel");
    var html = '<p class="export-csv__title">Export sections</p>';
    EXPORT_SECTION_ORDER.forEach(function (s) {
      html += '<label class="export-csv__option"><input type="checkbox" data-export-section="' + s + '" ' + (exportSections[s] ? "checked" : "") + " />" + esc(EXPORT_SECTION_LABELS[s]) + "</label>";
    });
    html += '<div class="export-csv__actions"><button class="link-button" id="exportCancelBtn">Cancel</button><button class="secondary-button" id="exportDownloadBtn">Download CSV</button></div>';
    panel.innerHTML = html;
    panel.querySelectorAll("[data-export-section]").forEach(function (cb) {
      cb.addEventListener("change", function () { exportSections[cb.getAttribute("data-export-section")] = cb.checked; });
    });
    panel.querySelector("#exportCancelBtn").addEventListener("click", function () { panel.style.display = "none"; });
    panel.querySelector("#exportDownloadBtn").addEventListener("click", function () {
      var sections = EXPORT_SECTION_ORDER.filter(function (s) { return exportSections[s]; });
      var summary = buildSummary(project);
      var csv = buildCombinedCsv(project, summary, sections);
      var safeName = project.name.replace(/[^a-z0-9 -]/gi, "").trim() || "project";
      downloadCsv(safeName + " - cashflow export.csv", csv);
      panel.style.display = "none";
    });
  }
  document.getElementById("exportCsvBtn").addEventListener("click", function () {
    var panel = document.getElementById("exportCsvPanel");
    var isOpen = panel.style.display !== "none";
    if (isOpen) { panel.style.display = "none"; return; }
    renderExportPanel();
    panel.style.display = "flex";
  });

  // ---------- print ----------
  function applyPrintSettingsToDom() {
    document.body.classList.toggle("print-grayscale", printSettings.colorMode === "grayscale");
    document.body.style.setProperty("--print-font-scale", String(FONT_SCALE[printSettings.fontSize]));
    document.body.style.setProperty("--print-row-padding", ROW_PADDING_PX[printSettings.rowSize] + "px");
    var styleEl = document.getElementById("dynamic-print-page");
    if (!styleEl) {
      styleEl = document.createElement("style");
      styleEl.id = "dynamic-print-page";
      document.head.appendChild(styleEl);
    }
    styleEl.textContent = "@page { size: " + pageCssSize(printSettings) + "; margin: " + marginCss(printSettings) + "; }";
  }
  function setPreviewMode(on) {
    previewMode = on;
    document.body.classList.toggle("print-preview-mode", on);
    document.getElementById("printPreviewBar").style.display = on ? "flex" : "none";
    if (on) applyPrintSettingsToDom();
    render();
  }
  document.getElementById("printBtn").addEventListener("click", function () {
    setPreviewMode(true);
  });
  document.getElementById("ppExitBtn").addEventListener("click", function () {
    setPreviewMode(false);
  });
  document.getElementById("ppPrintBtn").addEventListener("click", function () {
    window.print();
  });
  document.getElementById("ppPageSize").addEventListener("change", function (e) {
    printSettings.pageSize = e.target.value;
    applyPrintSettingsToDom();
    render();
  });
  document.getElementById("ppOrientation").addEventListener("change", function (e) {
    printSettings.orientation = e.target.value;
    applyPrintSettingsToDom();
    render();
  });
  document.getElementById("ppMargin").addEventListener("change", function (e) {
    printSettings.margin = e.target.value;
    document.getElementById("ppCustomMargins").style.display = printSettings.margin === "custom" ? "contents" : "none";
    applyPrintSettingsToDom();
    render();
  });
  document.getElementById("ppMarginTop").addEventListener("change", function (e) {
    printSettings.marginTopIn = Number(e.target.value) || 0;
    applyPrintSettingsToDom();
    render();
  });
  document.getElementById("ppMarginRight").addEventListener("change", function (e) {
    printSettings.marginRightIn = Number(e.target.value) || 0;
    applyPrintSettingsToDom();
    render();
  });
  document.getElementById("ppMarginBottom").addEventListener("change", function (e) {
    printSettings.marginBottomIn = Number(e.target.value) || 0;
    applyPrintSettingsToDom();
    render();
  });
  document.getElementById("ppMarginLeft").addEventListener("change", function (e) {
    printSettings.marginLeftIn = Number(e.target.value) || 0;
    applyPrintSettingsToDom();
    render();
  });
  document.getElementById("ppRepeatHeader").addEventListener("change", function (e) {
    printSettings.repeatHeader = e.target.checked;
    render();
  });
  document.getElementById("ppFontSize").addEventListener("change", function (e) {
    printSettings.fontSize = e.target.value;
    applyPrintSettingsToDom();
    render();
  });
  document.getElementById("ppRowSize").addEventListener("change", function (e) {
    printSettings.rowSize = e.target.value;
    applyPrintSettingsToDom();
    render();
  });
  document.getElementById("ppColorMode").addEventListener("change", function (e) {
    printSettings.colorMode = e.target.value;
    applyPrintSettingsToDom();
    render();
  });

  boot();
})();
</script>
</body>
</html>
